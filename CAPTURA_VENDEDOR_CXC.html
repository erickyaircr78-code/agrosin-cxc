<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--azul:#1d4ed8;--verde:#15803d;--rojo:#dc2626;--gris:#64748b;--borde:#e2e8f0;--fondo:#f1f5f9;--blanco:#ffffff;--texto:#0f172a;}
body{font-family:'Nunito',sans-serif;background:var(--fondo);min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--azul);}
.header-inner{padding:18px 20px 16px;text-align:center;position:relative;}
.logo-txt{font-size:11px;font-weight:900;letter-spacing:3px;color:rgba(255,255,255,.55);}
.titulo{font-size:22px;font-weight:900;color:#fff;margin-top:2px;}
.subtitulo{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px;}
.conn{position:absolute;top:18px;right:16px;display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:rgba(255,255,255,.7);}
.cdot{width:8px;height:8px;border-radius:50%;background:#86efac;animation:pp 2s ease-in-out infinite;}
.cdot.off{background:#fca5a5;animation:none;}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.3}}
.cuerpo{flex:1;padding:16px 14px 48px;}
.avance-card{background:linear-gradient(135deg,#1d4ed8 0%,#1e40af 100%);border-radius:16px;padding:18px 18px 14px;margin-bottom:14px;color:#fff;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.avance-saludo{font-size:13px;font-weight:700;opacity:.8;margin-bottom:10px;letter-spacing:.5px;}
.avance-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.avance-item{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;}
.avance-item.full{grid-column:1/-1;}
.avance-lbl{font-size:10px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.avance-val{font-size:18px;font-weight:900;}
.avance-val.verde{color:#86efac;}
.avance-val.rojo{color:#fca5a5;}
.avance-val.amarillo{color:#fde68a;}
.avance-bar-bg{height:6px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden;margin-top:6px;}
.avance-bar-fill{height:100%;border-radius:10px;transition:width .5s ease;}
.avance-sub{font-size:10px;opacity:.7;margin-top:4px;}
.tarjeta{background:var(--blanco);border-radius:18px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:20px 18px;margin-bottom:14px;}
.tarjeta-titulo{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);margin-bottom:16px;}
.campo{margin-bottom:13px;}
.campo label{display:block;font-size:11px;font-weight:800;color:var(--gris);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.campo select,.campo input{width:100%;padding:15px 14px;border:2px solid var(--borde);border-radius:12px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:700;background:#f8fafc;color:var(--texto);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none;}
.campo select:focus,.campo input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(29,78,216,.1);background:#fff;}
.campo input[type=number]{font-size:24px;letter-spacing:.5px;}
.fila2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dias-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dias-radio{display:none;}
.dia-lbl{display:block;padding:13px 4px;border:2px solid var(--borde);border-radius:12px;background:#f8fafc;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--gris);text-align:center;transition:all .15s;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.dias-radio:checked+.dia-lbl{background:var(--azul);border-color:var(--azul);color:#fff;box-shadow:0 3px 10px rgba(29,78,216,.35);}
.btn-reg{width:100%;padding:18px;background:var(--verde);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(21,128,61,.35);transition:all .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.btn-reg:active{transform:scale(.97);box-shadow:none;}
.btn-reg:disabled{background:#94a3b8;box-shadow:none;}
.hist-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--borde);border-radius:12px;margin-bottom:8px;background:#f8fafc;}
.hist-izq{flex:1;min-width:0;}
.hist-nombre{font-size:13px;font-weight:800;color:var(--texto);}
.hist-meta{font-size:11px;color:var(--gris);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-monto{font-size:17px;font-weight:900;color:var(--verde);white-space:nowrap;}
.hist-del{background:none;border:none;color:#cbd5e1;font-size:18px;cursor:pointer;padding:4px 6px;border-radius:6px;flex-shrink:0;touch-action:manipulation;}
.hist-del:active{color:var(--rojo);background:#fee2e2;}
.resumen-dia{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:var(--verde);font-weight:700;}
.vacio{text-align:center;color:var(--gris);font-size:13px;padding:22px 0;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:#0f172a;color:#fff;padding:13px 26px;border-radius:40px;font-size:14px;font-weight:800;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;max-width:88vw;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--verde);}
.toast.err{background:var(--rojo);}
</style>

function mostrarAvance(vendor) {
  var card = document.getElementById('avanceCard');
  if (!vendor) { card.style.display='none'; card.innerHTML=''; return; }
  var info = VD_CARTERA[vendor];
  if (!info) { card.style.display='none'; return; }
  var key = vendor.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'_').toUpperCase();
  db.ref('cobros/'+key).once('value').then(function(snap) {
    var c=snap.val()||{};
    var dias=['lun','mar','mie','jue','vie','sab'];
    var cob=dias.reduce(function(s,d){return s+(+c[d]||0);},0);
    var fal=Math.max(0,info.t-cob);
    var pct=info.t>0?Math.min(100,(cob/info.t)*100):0;
    var colorPct=pct>=60?'verde':pct>=25?'amarillo':'rojo';
    var colorBarra=pct>=60?'#86efac':pct>=25?'#fde68a':'#fca5a5';
    var nombre=vendor.split(' ')[0];
    nombre=nombre.charAt(0).toUpperCase()+nombre.slice(1).toLowerCase();
    card.innerHTML='<div class="avance-card">'+
      '<div class="avance-saludo">👋 Hola '+nombre+', tu avance de esta semana:</div>'+
      '<div class="avance-grid">'+
        '<div class="avance-item"><div class="avance-lbl">Total Cartera</div><div class="avance-val">$'+Math.round(info.t).toLocaleString('es-MX')+'</div></div>'+
        '<div class="avance-item"><div class="avance-lbl">Cobrado</div><div class="avance-val verde">'+(cob>0?'$'+Math.round(cob).toLocaleString('es-MX'):'$0')+'</div></div>'+
        '<div class="avance-item"><div class="avance-lbl">Falta por Cobrar</div><div class="avance-val rojo">$'+Math.round(fal).toLocaleString('es-MX')+'</div></div>'+
        '<div class="avance-item"><div class="avance-lbl">Avance</div><div class="avance-val '+colorPct+'">'+pct.toFixed(1)+'%</div></div>'+
        '<div class="avance-item full"><div class="avance-lbl">Progreso</div>'+
          '<div class="avance-bar-bg"><div class="avance-bar-fill" style="width:'+Math.round(pct)+'%;background:'+colorBarra+'"></div></div>'+
          '<div class="avance-sub">'+pct.toFixed(1)+'% de tu meta · faltan $'+Math.round(fal).toLocaleString('es-MX')+'</div>'+
        '</div>'+
      '</div></div>';
    card.style.display='block';
  }).catch(function(){ card.style.display='none'; });
}

function registrar() {
  var vendor = document.getElementById('selVendedor').value.trim();
  var monto  = parseFloat(document.getElementById('inpMonto').value);
  var tipo   = document.getElementById('selTipo').value.trim();
  var banco  = document.getElementById('selBanco').value.trim();
  if (!vendor)              { toast('⚠️ Selecciona tu nombre','err');       return; }
  if (!diaSeleccionado)     { toast('⚠️ Selecciona el día','err');          return; }
  if (!monto || monto <= 0) { toast('⚠️ Ingresa un monto válido','err');    return; }
  if (!tipo)                { toast('⚠️ Selecciona el tipo de pago','err'); return; }
  if (!banco)               { toast('⚠️ Selecciona el banco','err');        return; }
  var btn = document.getElementById('btnReg');
  btn.disabled = true; btn.innerHTML = '<span>⏳</span> Enviando…';
  var key = vendor.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'_').toUpperCase();
  var refDia = db.ref('cobros/'+key+'/'+diaSeleccionado);
  refDia.once('value').then(function(snap){
    return refDia.set(parseFloat(((snap.val()||0)+monto).toFixed(2)));
  }).then(function(){
    var ahora=new Date();
    var fecha=ahora.toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    return db.ref('log').push({vendor:vendor,key:key,day:diaSeleccionado,monto:monto,tipo:tipo,banco:banco,ts:ahora.getTime(),fecha:fecha});
  }).then(function(){
    var hist=JSON.parse(localStorage.getItem('hist_agrosin')||'[]');
    hist.unshift({vendor:vendor,day:diaSeleccionado,monto:monto,tipo:tipo,banco:banco,
      fecha:new Date().toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}),ts:Date.now()});
    localStorage.setItem('hist_agrosin',JSON.stringify(hist.slice(0,60)));
    document.getElementById('inpMonto').value='';
    document.getElementById('selTipo').value='';
    document.getElementById('selBanco').value='';
    mostrarAvance(vendor); renderHistorial();
    toast('✅ $'+monto.toLocaleString('es-MX',{minimumFractionDigits:2})+' registrado','ok');
  }).catch(function(e){ console.error(e); toast('❌ Error al guardar. Verifica internet.','err');
  }).finally(function(){ btn.disabled=false; btn.innerHTML='<span>💾</span> Registrar Cobro'; });
}

function eliminar(i) {
  var hoy=new Date().toDateString();
  var hist=JSON.parse(localStorage.getItem('hist_agrosin')||'[]');
  var deHoy=hist.filter(function(h){return new Date(h.ts).toDateString()===hoy;});
  var item=deHoy[i]; if(!item)return;
  if(!confirm('¿Eliminar este registro?\n'+item.vendor+' — $'+item.monto+'\n\nTambién se eliminará del tablero.'))return;
  var key=(item.key)||item.vendor.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'_').toUpperCase();
  var refDia=db.ref('cobros/'+key+'/'+item.day);
  refDia.once('value').then(function(snap){
    var actual=parseFloat(snap.val()||0);
    var nuevo=parseFloat((actual-item.monto).toFixed(2));
    return nuevo<=0?refDia.remove():refDia.set(nuevo);
  }).then(function(){return db.ref('log').orderByChild('ts').once('value');
  }).then(function(snapLog){
    var borrar=[];
    snapLog.forEach(function(child){var r=child.val();
      if((r.vendor||'').trim().toUpperCase()===(item.vendor||'').trim().toUpperCase()
        &&r.day===item.day&&Math.abs((+r.monto||0)-(+item.monto||0))<0.01
        &&Math.abs((+r.ts||0)-(+item.ts||0))<5000){borrar.push(child.key);}});
    return Promise.all(borrar.map(function(k){return db.ref('log/'+k).remove();}));
  }).then(function(){
    hist.splice(hist.indexOf(item),1);
    localStorage.setItem('hist_agrosin',JSON.stringify(hist));
    renderHistorial(); mostrarAvance(item.vendor);
    toast('🗑️ Registro eliminado','ok');
  }).catch(function(e){console.error(e);toast('❌ Error al eliminar.','err');});
}

function renderHistorial() {

  var hoy=new Date().toDateString();
  var hist=JSON.parse(localStorage.getItem('hist_agrosin')||'[]');
  var deHoy=hist.filter(function(h){return new Date(h.ts).toDateString()===hoy;});
  if(!deHoy.length){lista.innerHTML='<div class="vacio">Sin registros hoy.</div>';resumen.innerHTML='';return;}
  var totalHoy=deHoy.reduce(function(s,h){return s+(+h.monto||0);},0);
  resumen.innerHTML='<div class="resumen-dia">💰 Total hoy: $'+totalHoy.toLocaleString('es-MX',{minimumFractionDigits:2})+' · '+deHoy.length+' registro(s)</div>';
  lista.innerHTML=deHoy.map(function(h,i){
    return '<div class="hist-item">'+
      '<div class="hist-izq"><div class="hist-nombre">'+h.vendor+'</div>'+
      '<div class="hist-meta">'+(etqDias[h.day]||h.day)+' · '+h.tipo+' · '+h.banco+' · '+h.fecha+'</div></div>'+
      '<div class="hist-monto">$'+(+h.monto).toLocaleString('es-MX',{minimumFractionDigits:2})+'</div>'+
      '<button type="button" class="hist-del" onclick="eliminar('+i+')">✕</button></div>';
  }).join('');
}
var toastTimer;
function toast(msg,tipo){var el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(tipo||'');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show');},2800);}
renderHistorial();
</script>
</body>
</html>
